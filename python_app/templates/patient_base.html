<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portal del Paciente</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
  <header class="patient-top-nav">
    <div class="patient-brand"><strong>MediSync</strong> <span>| Portal del Paciente</span></div>
    <nav>
      <a href="{{ url_for('patient_home') }}" class="{% if active_page == 'inicio' %}active{% endif %}"><i class="fa-regular fa-user"></i> Inicio</a>
      <a href="{{ url_for('patient_citas') }}" class="{% if active_page == 'citas' %}active{% endif %}"><i class="fa-regular fa-calendar"></i> Mis Citas</a>
      <a href="{{ url_for('patient_expediente') }}" class="{% if active_page == 'expediente' %}active{% endif %}"><i class="fa-regular fa-file-lines"></i> Mi Expediente</a>
      <a href="{{ url_for('patient_agendar') }}" class="{% if active_page == 'agendar' %}active{% endif %}"><i class="fa-regular fa-circle-plus"></i> Agendar Cita</a>
    </nav>
    <div class="patient-user-chip">Juan Perez <span>JP</span></div>
  </header>

  <main class="patient-container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
